<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Ma Compta">
  <title>Ma Compta</title>
  <!--
    « Le ruban ». Un seul trait continu part en bas à droite, décrit l'arc du €,
    puis se déroule et s'envole vers le haut : le symbole monétaire et la courbe
    de croissance sont le même geste. Blanc à la base, corail à la pointe.

    Le dessin tient dans la zone de sécurité des icônes « maskable » (disque de
    80 % centré) : aucun élément n'est rogné quand Android ou iOS applique son
    propre masque.
  -->
  <defs>
    <linearGradient id="mcBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset=".58" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#3a2f9e"/>
    </linearGradient>
    <radialGradient id="mcGlow" cx=".82" cy=".9" r=".6">
      <stop offset="0" stop-color="#fb7185" stop-opacity=".55"/>
      <stop offset="1" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mcSheen" x1="0" y1="0" x2=".35" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity=".3"/>
      <stop offset=".6" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mcRibbon" x1=".1" y1="1" x2=".95" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".5" stop-color="#ffffff"/>
      <stop offset=".76" stop-color="#ffc4cd"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="114" fill="url(#mcBg)"/>
  <rect width="512" height="512" rx="114" fill="url(#mcGlow)"/>
  <rect width="512" height="512" rx="114" fill="url(#mcSheen)"/>

  <!-- Le ruban : arc du € prolongé d'une envolée. -->
  <path d="M406 132 C 375 152 350 172 332 196 A104 104 0 1 0 332 330"
        fill="none" stroke="url(#mcRibbon)" stroke-width="42" stroke-linecap="round"/>

  <!-- Les deux barres du €. -->
  <path d="M152 236h148M152 290h148"
        stroke="#ffffff" stroke-width="34" stroke-linecap="round"/>
</svg>
